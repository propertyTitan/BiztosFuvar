<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f33"/>
    </linearGradient>
    <linearGradient id="truck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB300"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Háttér kör -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Út sáv alul -->
  <rect x="60" y="340" width="392" height="24" rx="12" fill="#1a1a2e" opacity="0.5"/>
  <rect x="120" y="348" width="40" height="8" rx="4" fill="#FFB300" opacity="0.6"/>
  <rect x="200" y="348" width="40" height="8" rx="4" fill="#FFB300" opacity="0.6"/>
  <rect x="280" y="348" width="40" height="8" rx="4" fill="#FFB300" opacity="0.6"/>
  <rect x="360" y="348" width="40" height="8" rx="4" fill="#FFB300" opacity="0.6"/>

  <!-- Teherautó karosszéria -->
  <rect x="140" y="220" width="180" height="120" rx="12" fill="url(#truck)"/>

  <!-- Teherautó fülke -->
  <path d="M320,260 L370,260 Q390,260 390,280 L390,340 L320,340 Z" fill="#388E3C"/>
  <rect x="335" y="275" width="40" height="35" rx="6" fill="#81D4FA" opacity="0.7"/>

  <!-- Csomag a platón -->
  <rect x="170" y="240" width="55" height="50" rx="4" fill="url(#accent)"/>
  <rect x="240" y="255" width="45" height="35" rx="4" fill="#FF8F00" opacity="0.8"/>

  <!-- Csomag szalag -->
  <line x1="197" y1="240" x2="197" y2="290" stroke="#fff" stroke-width="2" opacity="0.5"/>
  <line x1="170" y2="265" x2="225" y1="265" stroke="#fff" stroke-width="2" opacity="0.5"/>

  <!-- Kerekek -->
  <circle cx="190" cy="345" r="28" fill="#263238"/>
  <circle cx="190" cy="345" r="16" fill="#455A64"/>
  <circle cx="190" cy="345" r="6" fill="#78909C"/>
  <circle cx="360" cy="345" r="28" fill="#263238"/>
  <circle cx="360" cy="345" r="16" fill="#455A64"/>
  <circle cx="360" cy="345" r="6" fill="#78909C"/>

  <!-- GPS pin a tetőn -->
  <g transform="translate(280, 155)">
    <path d="M0,0 C-20,0 -30,15 -30,30 C-30,50 0,70 0,70 C0,70 30,50 30,30 C30,15 20,0 0,0Z" fill="#EF4444"/>
    <circle cx="0" cy="28" r="10" fill="#fff"/>
  </g>

  <!-- Sebesség vonalak -->
  <rect x="80" y="260" width="40" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="90" y="280" width="30" height="4" rx="2" fill="#fff" opacity="0.2"/>
  <rect x="85" y="300" width="35" height="4" rx="2" fill="#fff" opacity="0.25"/>

  <!-- GoFuvar szöveg -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="62" fill="#ffffff" letter-spacing="3">
    GoFuvar
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d47"/>
      <stop offset="100%" style="stop-color:#0c1929"/>
    </linearGradient>
    <linearGradient id="truck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="50%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
  </defs>

  <!-- Háttér kör -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Külső zöld karika -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#ring)" stroke-width="10"/>

  <!-- Belső finom karika -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#2E7D32" stroke-width="2" opacity="0.3"/>

  <!-- Út sáv alul -->
  <rect x="100" y="320" width="312" height="18" rx="9" fill="#0a1520" opacity="0.6"/>
  <rect x="140" y="326" width="28" height="6" rx="3" fill="#FFB300" opacity="0.5"/>
  <rect x="200" y="326" width="28" height="6" rx="3" fill="#FFB300" opacity="0.5"/>
  <rect x="260" y="326" width="28" height="6" rx="3" fill="#FFB300" opacity="0.5"/>
  <rect x="320" y="326" width="28" height="6" rx="3" fill="#FFB300" opacity="0.5"/>

  <!-- Teherautó karosszéria -->
  <rect x="130" y="210" width="170" height="110" rx="10" fill="url(#truck)"/>

  <!-- Fülke -->
  <path d="M300,245 L348,245 Q365,245 365,265 L365,320 L300,320 Z" fill="#388E3C"/>

  <!-- Ablak -->
  <rect x="312" y="258" width="38" height="30" rx="5" fill="#B3E5FC" opacity="0.6"/>

  <!-- Fényszóró -->
  <rect x="358" y="295" width="10" height="14" rx="3" fill="#FFB300" opacity="0.8"/>

  <!-- Csomagok a platón -->
  <rect x="155" y="230" width="50" height="44" rx="5" fill="#FFB300"/>
  <line x1="180" y1="230" x2="180" y2="274" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <line x1="155" y1="252" x2="205" y2="252" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <rect x="218" y="242" width="42" height="32" rx="4" fill="#FF8F00" opacity="0.85"/>

  <!-- Kerekek -->
  <circle cx="185" cy="325" r="25" fill="#1a1a2e"/>
  <circle cx="185" cy="325" r="15" fill="#37474F"/>
  <circle cx="185" cy="325" r="5" fill="#607D8B"/>
  <circle cx="340" cy="325" r="25" fill="#1a1a2e"/>
  <circle cx="340" cy="325" r="15" fill="#37474F"/>
  <circle cx="340" cy="325" r="5" fill="#607D8B"/>

  <!-- Sebesség vonalak -->
  <rect x="75" y="248" width="35" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="82" y="265" width="28" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
  <rect x="78" y="282" width="32" height="3" rx="1.5" fill="#fff" opacity="0.18"/>

  <!-- GoFuvar szöveg -->
  <text x="256" y="412" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="4">
    GoFuvar
  </text>

  <!-- Tagline -->
  <text x="256" y="445" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="16" fill="#ffffff" opacity="0.5" letter-spacing="6">
    KÖZÖSSÉGI FUVARTŐZSDE
  </text>
</svg>

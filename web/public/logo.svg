<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoFuvar – teljes (horizontal) logó.
  280 × 80 viewBox. Bal oldalon egy stilizált kisteherautó guruló
  kerekekkel, a raktérben kiálló csomagokkal (két doboz, narancs + zöld),
  mögötte egy pici sebességvonal. Jobbra a "Go" zöld + "Fuvar" sötétkék
  szöveg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="GoFuvar">

  <!-- === Ikon háttere === -->
  <rect x="4" y="4" width="88" height="72" rx="18" fill="#1e40af"/>

  <!-- === Sebesség vonalak (motion lines) === -->
  <g stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="12" y1="26" x2="22" y2="26"/>
    <line x1="10" y1="34" x2="18" y2="34"/>
    <line x1="12" y1="42" x2="22" y2="42"/>
  </g>

  <!-- === Teherautó – raktér (hátsó nagyobb doboz) === -->
  <rect x="24" y="26" width="32" height="26" rx="3" fill="#ffffff"/>
  <!-- Raktér ajtó elválasztó -->
  <line x1="40" y1="28" x2="40" y2="50" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- === Teherautó – vezetőfülke === -->
  <path d="M 56 30 L 68 30 L 72 38 L 72 52 L 56 52 Z" fill="#ffffff"/>
  <!-- Szélvédő -->
  <path d="M 58 32 L 66 32 L 70 38 L 58 38 Z" fill="#60a5fa"/>

  <!-- === Csomagok kilátszódnak a raktérből (absztrakt) === -->
  <!-- Narancs doboz fent a raktéren -->
  <rect x="28" y="18" width="12" height="10" rx="1.5" fill="#f59e0b"/>
  <line x1="28" y1="23" x2="40" y2="23" stroke="#c2710c" stroke-width="1" opacity="0.6"/>
  <line x1="34" y1="18" x2="34" y2="28" stroke="#c2710c" stroke-width="1" opacity="0.6"/>

  <!-- Zöld kis doboz a nagy mögött -->
  <rect x="42" y="20" width="10" height="8" rx="1.5" fill="#16a34a"/>
  <line x1="42" y1="24" x2="52" y2="24" stroke="#0f7a3a" stroke-width="1" opacity="0.6"/>

  <!-- === Kerekek === -->
  <circle cx="32" cy="56" r="6" fill="#0f172a"/>
  <circle cx="32" cy="56" r="2.5" fill="#cbd5e1"/>
  <circle cx="62" cy="56" r="6" fill="#0f172a"/>
  <circle cx="62" cy="56" r="2.5" fill="#cbd5e1"/>

  <!-- === Út / föld === -->
  <rect x="12" y="66" width="72" height="2" rx="1" fill="#86efac"/>

  <!-- === Szöveg: Go + Fuvar === -->
  <g font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38">
    <text x="104" y="52" fill="#16a34a" letter-spacing="-1">Go</text>
    <text x="150" y="52" fill="#0f172a" letter-spacing="-1">Fuvar</text>
  </g>
</svg>

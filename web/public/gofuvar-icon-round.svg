<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f33"/>
    </linearGradient>
    <linearGradient id="truck2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- Háttér kör -->
  <circle cx="256" cy="256" r="256" fill="url(#bg2)"/>

  <!-- Zöld kör belül -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="#2E7D32" stroke-width="8" opacity="0.3"/>

  <!-- Egyszerű teherautó ikon -->
  <g transform="translate(130, 170)">
    <!-- Plató -->
    <rect x="0" y="50" width="160" height="100" rx="10" fill="url(#truck2)"/>
    <!-- Fülke -->
    <path d="M160,75 L210,75 Q230,75 230,95 L230,150 L160,150 Z" fill="#388E3C"/>
    <!-- Ablak -->
    <rect x="172" y="90" width="42" height="32" rx="5" fill="#81D4FA" opacity="0.7"/>
    <!-- Csomag -->
    <rect x="25" y="70" width="50" height="45" rx="4" fill="#FFB300"/>
    <rect x="90" y="85" width="40" height="30" rx="4" fill="#FF8F00" opacity="0.8"/>
    <!-- Kerekek -->
    <circle cx="55" cy="155" r="24" fill="#263238"/>
    <circle cx="55" cy="155" r="14" fill="#455A64"/>
    <circle cx="55" cy="155" r="5" fill="#78909C"/>
    <circle cx="200" cy="155" r="24" fill="#263238"/>
    <circle cx="200" cy="155" r="14" fill="#455A64"/>
    <circle cx="200" cy="155" r="5" fill="#78909C"/>
  </g>

  <!-- GPS pin -->
  <g transform="translate(310, 130)">
    <path d="M0,0 C-15,0 -22,12 -22,22 C-22,38 0,52 0,52 C0,52 22,38 22,22 C22,12 15,0 0,0Z" fill="#EF4444"/>
    <circle cx="0" cy="20" r="7" fill="#fff"/>
  </g>

  <!-- "GF" betűk alul -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="56" fill="#ffffff" letter-spacing="6">
    GF
  </text>
</svg>

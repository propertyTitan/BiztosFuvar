<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoFuvar – monochrome fehér verzió sötét / színes háttérre (SiteHeader).
  Ugyanaz a teherautó layout, de minden fehér / világos pasztell.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" role="img" aria-label="GoFuvar">
  <rect x="4" y="4" width="88" height="72" rx="18" fill="rgba(255,255,255,0.18)"/>

  <!-- Sebesség vonalak -->
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.45">
    <line x1="12" y1="26" x2="22" y2="26"/>
    <line x1="10" y1="34" x2="18" y2="34"/>
    <line x1="12" y1="42" x2="22" y2="42"/>
  </g>

  <!-- Teherautó raktér -->
  <rect x="24" y="26" width="32" height="26" rx="3" fill="#ffffff"/>
  <line x1="40" y1="28" x2="40" y2="50" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Vezetőfülke -->
  <path d="M 56 30 L 68 30 L 72 38 L 72 52 L 56 52 Z" fill="#ffffff"/>
  <path d="M 58 32 L 66 32 L 70 38 L 58 38 Z" fill="#93c5fd"/>

  <!-- Csomagok -->
  <rect x="28" y="18" width="12" height="10" rx="1.5" fill="#fbbf24"/>
  <line x1="28" y1="23" x2="40" y2="23" stroke="#d97706" stroke-width="1" opacity="0.6"/>
  <line x1="34" y1="18" x2="34" y2="28" stroke="#d97706" stroke-width="1" opacity="0.6"/>

  <rect x="42" y="20" width="10" height="8" rx="1.5" fill="#86efac"/>
  <line x1="42" y1="24" x2="52" y2="24" stroke="#16a34a" stroke-width="1" opacity="0.6"/>

  <!-- Kerekek -->
  <circle cx="32" cy="56" r="6" fill="#0f172a"/>
  <circle cx="32" cy="56" r="2.5" fill="#ffffff"/>
  <circle cx="62" cy="56" r="6" fill="#0f172a"/>
  <circle cx="62" cy="56" r="2.5" fill="#ffffff"/>

  <!-- Út -->
  <rect x="12" y="66" width="72" height="2" rx="1" fill="#86efac"/>

  <g font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38">
    <text x="104" y="52" fill="#86efac" letter-spacing="-1">Go</text>
    <text x="150" y="52" fill="#ffffff" letter-spacing="-1">Fuvar</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoFuvar – monochrome white verzió sötét / színes háttérre (pl. headerbe).
  Ugyanaz a layout, de minden fehér / halvány átlátszó.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 72" role="img" aria-label="GoFuvar">
  <rect x="4" y="4" width="64" height="64" rx="16" fill="rgba(255,255,255,0.15)"/>

  <path d="M 16 48 Q 36 14 62 28" stroke="rgba(255,255,255,0.3)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="18" y1="36" x2="48" y2="36"/>
    <polyline points="40,24 54,36 40,48"/>
  </g>

  <rect x="18" y="56" width="36" height="4" rx="2" fill="#86efac"/>

  <g font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38">
    <text x="82" y="48" fill="#86efac" letter-spacing="-1">Go</text>
    <text x="128" y="48" fill="#ffffff" letter-spacing="-1">Fuvar</text>
  </g>
</svg>
